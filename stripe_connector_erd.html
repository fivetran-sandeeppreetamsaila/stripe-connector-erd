<style>
:root{--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--xs:#94a3b8;
--green:#16a34a;--green-bg:#dcfce7;--yellow:#ca8a04;--yellow-bg:#fef9c3;--red:#dc2626;--red-bg:#fee2e2;
--p1:#dc2626;--p2:#ea580c;--p3:#ca8a04;--p4:#2563eb;--p5:#64748b;
--card-w:210px;--radius:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}

/* HEADER */
#hdr{position:sticky;top:0;z-index:200;background:#0f172a;color:#f1f5f9;padding:10px 20px;
  display:flex;align-items:center;gap:12px;border-bottom:1px solid #1e293b;}
#hdr h1{font-size:14px;font-weight:700;white-space:nowrap;}
#hdr .epic{font-size:11px;color:#64748b;text-decoration:none;}
#hdr .epic:hover{color:#94a3b8;}
.hstats{margin-left:auto;display:flex;gap:14px;font-size:11px;color:#64748b;}
.hstat{display:flex;align-items:center;gap:4px;}
.sdot{width:7px;height:7px;border-radius:50%;}
.sdot.supported{background:#22c55e;}.sdot.partial{background:#eab308;}.sdot.missing{background:#ef4444;}

/* FILTER BAR */
#fbar{position:sticky;top:41px;z-index:199;background:#fff;border-bottom:1px solid var(--border);
  padding:7px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.fg{display:flex;align-items:center;gap:5px;}
.flabel{font-size:10px;font-weight:700;color:var(--xs);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;border:1px solid var(--border);
  font-size:11px;cursor:pointer;user-select:none;background:#fff;color:var(--muted);transition:all .12s;white-space:nowrap;}
.pill:hover{background:var(--bg);}
.pill.on{border-color:transparent;color:#fff;}
.pill.on.s-supported{background:#16a34a;}.pill.on.s-partial{background:#ca8a04;}.pill.on.s-missing{background:#dc2626;}
.pill.on.p-pill{background:#334155;}.pill.on.d-pill{background:#4f46e5;}
.pill.d-pill{border-left-width:3px;}
#srch{margin-left:auto;padding:4px 10px;border:1px solid var(--border);border-radius:6px;
  font-size:12px;width:180px;outline:none;}
#srch:focus{border-color:#6366f1;box-shadow:0 0 0 2px #e0e7ff;}
#fcnt{font-size:11px;color:var(--xs);white-space:nowrap;}

/* DOMAIN FILTER ROW */
#drow{background:#f8fafc;border-bottom:1px solid var(--border);padding:5px 20px;
  display:flex;align-items:center;gap:6px;overflow-x:auto;flex-shrink:0;}
#drow::-webkit-scrollbar{height:4px;}
#drow::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:2px;}

/* MAIN */
#main{padding:16px 20px;display:flex;flex-direction:column;gap:20px;}

/* DOMAIN SECTION */
.dsec{}
.dsec.hidden{display:none;}
.dsec.collapsed .dcards{display:none;}
.dhdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;cursor:pointer;user-select:none;padding:0 2px;}
.dbar{width:4px;height:18px;border-radius:2px;flex-shrink:0;}
.dname{font-size:13px;font-weight:700;letter-spacing:-.01em;}
.dcnt{font-size:11px;color:var(--xs);}
.dnn{font-size:10px;font-weight:600;padding:1px 6px;border-radius:99px;background:#ede9fe;color:#7c3aed;}
.dchev{margin-left:auto;font-size:10px;color:var(--xs);}
.dcards{display:flex;flex-wrap:wrap;gap:9px;}

/* TABLE CARD */
.tcard{width:var(--card-w);background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);
  overflow:hidden;cursor:pointer;transition:border-color .12s,box-shadow .12s,opacity .12s;position:relative;}
.tcard:hover{border-color:#94a3b8;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.tcard.hidden{display:none;}
.tcard.dimmed{opacity:.25;}
.tcard.fk-out{border-color:#0d9488!important;box-shadow:0 0 0 2px #ccfbf1;}
.tcard.fk-in{border-color:#7c3aed!important;box-shadow:0 0 0 2px #ede9fe;}
.tcard.focused{border-color:#0f172a!important;box-shadow:0 0 0 2px #cbd5e1;}

.ctop{padding:7px 9px 5px;display:flex;align-items:flex-start;gap:5px;border-bottom:1px solid #f1f5f9;}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.cdot.supported{background:#22c55e;}.cdot.partial{background:#eab308;}.cdot.missing{background:#ef4444;}
.cname{font-size:11px;font-weight:700;flex:1;line-height:1.3;word-break:break-word;}
.pbadge{font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;color:#fff;flex-shrink:0;letter-spacing:.02em;}
.pbadge.done{background:#e2e8f0;color:#64748b;}.pbadge.P1{background:var(--p1);}.pbadge.P2{background:var(--p2);}
.pbadge.P3{background:var(--p3);}.pbadge.P4{background:var(--p4);}.pbadge.P5{background:var(--p5);}

.cpath{padding:2px 9px 4px;font-size:9px;color:var(--xs);font-family:'SF Mono','Fira Code',monospace;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.clinx{padding:3px 9px 5px;display:flex;gap:5px;align-items:center;border-bottom:1px solid #f1f5f9;}
.lbtn{font-size:10px;text-decoration:none;padding:2px 6px;border-radius:4px;border:1px solid var(--border);
  display:inline-flex;align-items:center;gap:2px;transition:background .1s;color:var(--muted);}
.lbtn:hover{background:var(--bg);}
.lbtn.api{color:#0284c7;border-color:#bae6fd;}
.lbtn.jira{color:#0052cc;border-color:#bfdbfe;}

/* Expanded columns */
.ccols{display:none;border-top:1px solid var(--border);padding:3px 0;}
.tcard.expanded .ccols{display:block;}
.crow{display:flex;align-items:center;padding:2px 9px;font-size:9.5px;}
.ckey{width:38px;flex-shrink:0;font-size:8.5px;font-weight:700;text-transform:uppercase;color:#94a3b8;}
.ckey.pk{color:#1e293b;}.ckey.fk{color:#7c3aed;}.ckey.pkfk{color:#0d9488;}
.ccolname{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ctype{font-size:8.5px;color:var(--xs);font-style:italic;margin-left:3px;white-space:nowrap;}
.csep{height:1px;background:var(--border);margin:3px 0;}

/* FK info (expanded) */
.cfkinfo{display:none;border-top:1px solid var(--border);padding:5px 9px;font-size:9.5px;}
.tcard.expanded .cfkinfo{display:block;}
.fkrow{display:flex;gap:4px;margin-bottom:3px;align-items:flex-start;}
.fkdir{font-size:8.5px;font-weight:700;color:var(--xs);text-transform:uppercase;white-space:nowrap;padding-top:2px;width:36px;flex-shrink:0;}
.fkchips{display:flex;flex-wrap:wrap;gap:2px;}
.fkchip{font-size:9px;padding:1px 5px;border-radius:3px;background:#f1f5f9;color:#475569;cursor:pointer;
  border:1px solid #e2e8f0;transition:background .1s;}
.fkchip:hover{background:#e2e8f0;}
.fknone{font-size:9px;color:var(--xs);}

/* FK SVG OVERLAY */
#fksvg{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:300;}
</style>

// Stripe API doc URL builder
function docUrl(api){
  const path=api.replace(/\/v1\//,"").replace(/\/:id\/.*/,"").replace(/_/g,"-");
  return `https://stripe.com/docs/api/${path}`;
}

// Render domain filter pills
function renderDomainPills(){
  const row=document.getElementById("drow");
  Object.keys(DC).sort((a,b)=>DC[a].order-DC[b].order).forEach(d=>{
    const cnt=T.filter(t=>t.d===d).length;
    const pill=document.createElement("div");
    pill.className="pill on d-pill";
    pill.dataset.ft="domain";pill.dataset.fv=d;
    pill.style.borderLeftColor=DC[d].color;
    pill.textContent=`${d} (${cnt})`;
    row.appendChild(pill);
  });
}

// Build card HTML
function mkCard(t){
  const color=DC[t.d].color;
  const pl=t.p==="done"?"✓":t.p;
  const pCls=t.p.toLowerCase();
  const fTo=t.fkTo||[];
  const fFrom=fkFrom[t.id]||[];

  const colRows=t.cols.map(([n,k,ty])=>{
    const kc=k?(k.includes(",")?"pkfk":k.toLowerCase()):"";
    return `<div class="crow"><span class="ckey ${kc}">${k||""}</span><span class="ccolname">${n}</span><span class="ctype">${ty}</span></div>`;
  }).join("")+"<div class='csep'></div>";

  const toChips=fTo.length?fTo.map(id=>`<span class="fkchip" data-jump="${id}">${id}</span>`).join(""):`<span class="fknone">none</span>`;
  const fromChips=fFrom.length?fFrom.map(id=>`<span class="fkchip" data-jump="${id}">${id}</span>`).join(""):`<span class="fknone">none</span>`;

  const jiraLinks=t.tickets.map(tk=>`<a href="https://fivetran.atlassian.net/browse/${tk}" class="lbtn jira" target="_blank">${tk}</a>`).join("");

  const el=document.createElement("div");
  el.className="tcard";el.id=`c-${t.id}`;
  el.dataset.s=t.s;el.dataset.p=t.p;el.dataset.d=t.d;el.dataset.tid=t.id;
  el.innerHTML=`
    <div class="ctop">
      <span class="cdot ${t.s}"></span>
      <span class="cname">${t.id}</span>
      <span class="pbadge ${pCls}">${pl}</span>
    </div>
    <div class="cpath" title="${t.api}">${t.api}</div>
    <div class="clinx">
      <a href="${docUrl(t.api)}" class="lbtn api" target="_blank">API ↗</a>
      ${jiraLinks}
    </div>
    <div class="ccols">${colRows}</div>
    <div class="cfkinfo">
      <div class="fkrow"><span class="fkdir">→ refs</span><div class="fkchips">${toChips}</div></div>
      <div class="fkrow"><span class="fkdir">← used by</span><div class="fkchips">${fromChips}</div></div>
    </div>`;

  // Click header = expand + focus FK
  el.querySelector(".ctop").addEventListener("click",e=>{e.stopPropagation();focusCard(t.id);});
  el.querySelectorAll("a").forEach(a=>a.addEventListener("click",e=>e.stopPropagation()));
  el.querySelectorAll(".fkchip").forEach(chip=>chip.addEventListener("click",e=>{
    e.stopPropagation();
    const tid=chip.dataset.jump;
    const target=document.getElementById(`c-${tid}`);
    if(target){target.scrollIntoView({behavior:"smooth",block:"center"});flash(target);}
  }));
  return el;
}

function flash(el){
  el.style.outline="2px solid #6366f1";
  setTimeout(()=>el.style.outline="",700);
}

// Render all domain sections
function renderDomains(){
  const main=document.getElementById("main");
  main.innerHTML="";
  Object.keys(DC).sort((a,b)=>DC[a].order-DC[b].order).forEach(d=>{
    const tables=T.filter(t=>t.d===d);
    const netNew=tables.filter(t=>t.s==="missing").length;
    const color=DC[d].color;
    const sec=document.createElement("div");
    sec.className="dsec";sec.dataset.d=d;
    sec.innerHTML=`<div class="dhdr">
      <div class="dbar" style="background:${color}"></div>
      <span class="dname">${d}</span>
      <span class="dcnt" id="cnt-${d.replace(/\s+/g,'_')}">${tables.length} tables</span>
      ${netNew>0?`<span class="dnn">${netNew} net-new</span>`:""}
      <span class="dchev">▲</span>
    </div>`;
    const cards=document.createElement("div");
    cards.className="dcards";cards.id=`cards-${d.replace(/\s+/g,'_')}`;
    tables.forEach(t=>cards.appendChild(mkCard(t)));
    sec.querySelector(".dhdr").addEventListener("click",()=>sec.classList.toggle("collapsed"));
    sec.appendChild(cards);
    main.appendChild(sec);
  });
}

// Focus a table: expand it, highlight FK relations, draw lines
function focusCard(tid){
  if(focused===tid){
    // Unfocus
    focused=null;
    document.querySelectorAll(".tcard").forEach(c=>c.classList.remove("expanded","focused","fk-out","fk-in","dimmed"));
    clearLines();
    return;
  }
  focused=tid;
  const t=T.find(t=>t.id===tid);
  const related=new Set([...(t.fkTo||[]),...(fkFrom[tid]||[])]);
  document.querySelectorAll(".tcard").forEach(c=>{
    const cid=c.dataset.tid;
    c.classList.remove("expanded","focused","fk-out","fk-in","dimmed");
    if(cid===tid){c.classList.add("expanded","focused");}
    else if((t.fkTo||[]).includes(cid)){c.classList.add("fk-out");}
    else if((fkFrom[tid]||[]).includes(cid)){c.classList.add("fk-in");}
    else if(!related.has(cid)){c.classList.add("dimmed");}
  });
  drawLines(tid,t.fkTo,fkFrom[tid]);
}

// FK line drawing
const svg=document.getElementById("fksvg");
function clearLines(){while(svg.firstChild)svg.removeChild(svg.firstChild);}
function drawLines(srcId,outs,ins){
  clearLines();
  const srcEl=document.getElementById(`c-${srcId}`);
  if(!srcEl)return;
  const drawLine=(from,to,color,dash)=>{
    if(!from||!to)return;
    const fr=from.getBoundingClientRect(),tr=to.getBoundingClientRect();
    const x1=fr.left+fr.width/2,y1=fr.top+fr.height/2;
    const x2=tr.left+tr.width/2,y2=tr.top+tr.height/2;
    const dx=Math.max(Math.abs(x2-x1)*0.45,80);
    const p=document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d",`M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`);
    p.setAttribute("stroke",color);p.setAttribute("stroke-width","1.8");
    p.setAttribute("fill","none");p.setAttribute("opacity","0.65");
    if(dash)p.setAttribute("stroke-dasharray","5,3");
    // arrowhead
    const ang=Math.atan2(y2-y1,x2-x1);
    const ax=x2-9*Math.cos(ang),ay=y2-9*Math.sin(ang);
    const ar=document.createElementNS("http://www.w3.org/2000/svg","path");
    ar.setAttribute("d",`M${x2},${y2} L${ax-4*Math.sin(ang)},${ay+4*Math.cos(ang)} L${ax+4*Math.sin(ang)},${ay-4*Math.cos(ang)}Z`);
    ar.setAttribute("fill",color);ar.setAttribute("opacity","0.65");
    svg.appendChild(p);svg.appendChild(ar);
  };
  (outs||[]).forEach(oid=>drawLine(srcEl,document.getElementById(`c-${oid}`),"#0d9488",false));
  (ins||[]).forEach(iid=>drawLine(document.getElementById(`c-${iid}`),srcEl,"#7c3aed",true));
}

// Redraw lines on scroll
let stimer;
window.addEventListener("scroll",()=>{
  if(!focused)return;
  clearTimeout(stimer);
  stimer=setTimeout(()=>{
    const t=T.find(t=>t.id===focused);
    drawLines(focused,t.fkTo,fkFrom[focused]);
  },60);
},{passive:true});

});

// ESC to unfocus
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&focused)focusCard(focused);});

// Filters
function applyFilters(){
  const q=searchQ.toLowerCase();
  let vis=0,ns=0,np=0,nm=0;
  T.forEach(t=>{
    const el=document.getElementById(`c-${t.id}`);
    if(!el)return;
    const ok=AF.status.has(t.s)&&AF.priority.has(t.p)&&ADomains.has(t.d)&&
      (!q||t.id.toLowerCase().includes(q)||t.api.toLowerCase().includes(q)||t.tickets.some(tk=>tk.toLowerCase().includes(q)));
    el.classList.toggle("hidden",!ok);
    if(ok){vis++;if(t.s==="supported")ns++;else if(t.s==="partial")np++;else nm++;}
  });
  // Update domain sections
  Object.keys(DC).forEach(d=>{
    const key=d.replace(/\s+/g,'_');
    const sec=document.querySelector(`.dsec[data-d="${d}"]`);
    if(!sec)return;
    const v=T.filter(t=>t.d===d&&!document.getElementById(`c-${t.id}`)?.classList.contains("hidden")).length;
    const cnt=document.getElementById(`cnt-${key}`);
    if(cnt)cnt.textContent=`${v} tables`;
    sec.classList.toggle("hidden",v===0);
  });
  document.getElementById("fcnt").textContent=`${vis} / ${T.length}`;
  document.getElementById("ns").textContent=ns;
  document.getElementById("np").textContent=np;
  document.getElementById("nm").textContent=nm;
  document.getElementById("nt").textContent=vis;
}

// Pill clicks
document.addEventListener("click",e=>{
  const pill=e.target.closest(".pill[data-ft]");
  if(!pill)return;
  e.stopPropagation();
  const ft=pill.dataset.ft,fv=pill.dataset.fv;
  if(ft==="status"){
    if(AF.status.has(fv)){AF.status.delete(fv);pill.classList.remove("on");}
    else{AF.status.add(fv);pill.classList.add("on");}
  } else if(ft==="priority"){
    if(AF.priority.has(fv)){AF.priority.delete(fv);pill.classList.remove("on");}
    else{AF.priority.add(fv);pill.classList.add("on");}
  } else if(ft==="domain"){
    if(ADomains.has(fv)){ADomains.delete(fv);pill.classList.remove("on");}
    else{ADomains.add(fv);pill.classList.add("on");}
  }
  applyFilters();
});

// Search
document.getElementById("srch").addEventListener("input",e=>{searchQ=e.target.value;applyFilters();});

// Init
renderDomainPills();
renderDomains();
applyFilters();
</script>
</body>
</html>
